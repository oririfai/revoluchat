version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────
  # Phoenix Elixir Application (Chatbe Backend)
  # ─────────────────────────────────────────────────────────────────
  revoluchat:
    build: .
    image: revoluchat:enterprise-latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - PORT=4000
      - MIX_ENV=prod
      - PHX_SERVER=true
      - PHX_HOST=${PHX_HOST:-localhost}
      - DATABASE_URL=ecto://postgres:postgres@db/revoluchat_prod
      - MINIO_HOST=minio
      - MINIO_PUBLIC_HOST=${MINIO_PUBLIC_HOST:-localhost}
      - MINIO_PORT=9000
    command: sh -c "/app/bin/migrate && /app/bin/revoluchat start"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=revoluchat_prod
    volumes:
      - revoluchat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  revoluchat_pg_data:
  minio_data:
