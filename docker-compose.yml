version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────
  # Phoenix Elixir Application (Chatbe Backend)
  # ─────────────────────────────────────────────────────────────────
  revoluchat:
    build: .
    image: revoluchat:enterprise-latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MIX_ENV=prod
      - PHX_SERVER=true
      - PHX_HOST=${PHX_HOST:-localhost}
      # Encryption secrets
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-replace_this_with_a_secure_long_random_string_at_least_64_bytes}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://host.docker.internal:8000/api/revoluchat/webhook}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-replace_with_client_webhook_hmac_secret}
      # Database connection
      - DATABASE_URL=ecto://postgres:postgres@db/revoluchat_prod
      # Auth Config (Detached)
      - JWKS_URL=${JWKS_URL:-https://client-auth.example.com/.well-known/jwks.json}
      # Object Storage (Optional MinIO)
      # - AWS_ACCESS_KEY_ID=minioadmin
      # - AWS_SECRET_ACCESS_KEY=minioadmin
      # - MINIO_HOST=minio
      # - MINIO_PORT=9000
      # - STORAGE_BUCKET=revoluchat
    # Tunggu database siap, jalankan migration otomatis, lalu start server
    command: sh -c "/app/bin/migrate && /app/bin/revoluchat start"
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────
  # Primary Database (PostgreSQL)
  # ─────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=revoluchat_prod
    volumes:
      - revoluchat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  revoluchat_pg_data:
